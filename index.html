<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/bb_logo.png" />
  <title>Balloon Blaster</title>
</head>

<body>

<div id="app">

  <div id="scoreBoard">
    Score: <span id="score">0</span>
    High Score: <span id="highScore">0</span>
  </div>
  <div id="missCounter">
    Balloons left to fill the basket: <span id="missLeft">15</span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="gameOverScreen">
    <h1>Game Over</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <p id="scoreMessage"></p>

    <div id="nameInputSection">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="10" />
      <button id="saveScoreBtn">Submit Score</button>
      <p id="nameError"></p>
    </div>

    <h2>Top Players</h2>
    <ul id="leaderboardList"></ul>

    <div id="shareSection">
      <button id="copyScoreBtn">📋 Copy Score</button>
      <button id="whatsappShareBtn">📤 Share on WhatsApp</button>
    </div>

    <button id="playAgainBtn">Play Again</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</div>


</body>
</html>
